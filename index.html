<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helium SCF Solver</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');

:root {
    --bg-gradient-1: #0f172a;
    --bg-gradient-2: #1e1b4b;
    --bg-gradient-3: #020617;
    --surface: rgba(30, 41, 59, 0.65);
    --surface-border: rgba(255, 255, 255, 0.08);
    --primary: #3b82f6;
    --primary-hover: #60a5fa;
    --primary-glow: rgba(59, 130, 246, 0.4);
    --text: #f8fafc;
    --text-muted: #94a3b8;
    --border: rgba(255, 255, 255, 0.1);
    --error: #ef4444;
}
body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3), var(--bg-gradient-1));
    background-size: 300% 300%;
    animation: gradientBG 20s ease infinite;
    color: var(--text);
    margin: 0;
    padding: 2rem 1rem;
    line-height: 1.6;
    min-height: 100vh;
}
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
.container {
    max-width: 1200px;
    margin: 0 auto;
}
header {
    margin-bottom: 3rem;
    text-align: center;
    animation: fadeInDown 0.8s ease-out;
}
@keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}
h1 {
    font-size: 3.5rem;
    font-weight: 700;
    background: linear-gradient(to right, #a855f7, #3b82f6, #2dd4bf);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0 0 0.5rem 0;
    text-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
    letter-spacing: -0.02em;
}
.panel {
    background: var(--surface);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--surface-border);
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 2rem;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.panel:hover {
    box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
    border-color: rgba(255,255,255,0.12);
}
@keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
.animate-in {
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.input-row {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
}
.form-group {
    flex: 1;
    min-width: 200px;
}
label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
input {
    width: 100%;
    padding: 0.85rem 1rem;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 1.1rem;
    font-family: 'Fira Code', monospace;
    transition: all 0.3s ease;
}
input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-glow);
    background: rgba(0, 0, 0, 0.4);
}
.btn-group {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
}
button {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    border: none;
    padding: 0.85rem 1.75rem;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
}
button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5);
    background: linear-gradient(135deg, #60a5fa, #3b82f6);
}
button:active {
    transform: translateY(1px);
    box-shadow: 0 2px 10px rgba(37, 99, 235, 0.4);
}
button.secondary {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    box-shadow: none;
}
button.secondary:hover {
    background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}
.status {
    padding: 1rem 1.5rem;
    border-radius: 8px;
    margin-bottom: 1.5rem;
    display: none;
    border: 1px solid var(--error);
    background: rgba(239, 68, 68, 0.15);
    color: #fca5a5;
    backdrop-filter: blur(8px);
    animation: slideUp 0.3s ease forwards;
}
table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-top: 0.5rem;
    font-family: 'Fira Code', monospace;
    font-size: 0.85rem;
    background: rgba(0,0,0,0.25);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
}
th, td {
    padding: 0.85rem;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid rgba(255,255,255,0.03);
    text-align: right;
    transition: background 0.2s;
}
th:last-child, td:last-child {
    border-right: none;
}
tr:last-child td {
    border-bottom: none;
}
th {
    background: rgba(0,0,0,0.4);
    color: #cbd5e1;
    font-weight: 600;
    text-align: center;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
}
tr:hover td {
    background: rgba(255,255,255,0.08);
}
h2 {
    font-size: 1.5rem;
    margin-top: 0;
    margin-bottom: 1.5rem;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 0.75rem;
}
h2::before {
    content: '';
    display: block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 12px var(--primary);
}
h4 {
    margin: 1.5rem 0 0.75rem 0;
    color: #e2e8f0;
    font-weight: 500;
}
.matrices-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 2rem;
}
hr {
    border: 0;
    border-top: 1px solid rgba(255,255,255,0.1);
    margin: 2rem 0;
}
.stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
}
.stat-box {
    background: rgba(0,0,0,0.25);
    padding: 1.25rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    border-left: 3px solid var(--primary);
}
.stat-label {
    font-size: 0.8rem;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
}
.stat-val {
    font-size: 1.25rem;
    font-weight: 600;
    font-family: 'Fira Code', monospace;
    color: #fff;
}
.stat-val.success {
    color: #4ade80;
    text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
}
.stat-val.fail {
    color: #f87171;
    text-shadow: 0 0 10px rgba(248, 113, 113, 0.3);
}
</style>
</head>
<body>

<div class="container">
    <header>
        <h1>Helium SCF Solver</h1>
        <p style="color: var(--text-muted);">Variational solution with small Gaussian basis</p>
    </header>

    <div class="status" id="status"></div>

    <div class="panel">
        <div class="input-row">
            <div class="form-group">
                <label for="M">Number of Basis Functions (M)</label>
                <input type="number" id="M" placeholder="e.g. 3" min="1">
            </div>
            <div class="form-group" style="flex: 2;">
                <label for="alphas">Alpha values (comma-separated)</label>
                <input type="text" id="alphas" placeholder="e.g. 0.3, 1.2, 2.5">
            </div>
        </div>
        <div class="btn-group">
            <button onclick="main()">
                <svg style="width: 20px; height: 20px; margin-right: 8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Run Calculation
            </button>
            <button class="secondary" onclick="loadExample()">Load Example</button>
            <button class="secondary" onclick="clearAll()">Clear</button>
        </div>
    </div>

    <div class="panel" id="part1-panel" style="display: none;">
        <h2>1. Matrices</h2>
        <div id="part1-content"></div>
    </div>

    <div class="panel" id="part2-panel" style="display: none;">
        <h2>2. SCF Iterations</h2>
        <div style="overflow-x: auto;">
            <div id="part2-content"></div>
        </div>
    </div>

    <div class="panel" id="part3-panel" style="display: none;">
        <h2>3. Final Results & Checks</h2>
        <div id="part3-content"></div>
    </div>
</div>

<script>
// --- UI Helpers ---
function loadExample() {
    document.getElementById("M").value = "3";
    document.getElementById("alphas").value = "0.3, 1.2, 2.5";
}

function clearAll() {
    document.getElementById("M").value = "";
    document.getElementById("alphas").value = "";
    document.getElementById("part1-panel").style.display = "none";
    document.getElementById("part2-panel").style.display = "none";
    document.getElementById("part3-panel").style.display = "none";
    document.getElementById("status").style.display = "none";
}

function showError(msg) {
    const st = document.getElementById("status");
    st.innerText = msg;
    st.style.display = "block";
}

function formatNum(num) {
    if (Math.abs(num) < 1e-12) return "0.00000000";
    return num.toFixed(8);
}

function renderMatrix(name, mat) {
    let html = `<h4>${name}</h4><table><tbody>`;
    for(let row of mat) {
        html += `<tr>${row.map(val => `<td>${formatNum(val)}</td>`).join("")}</tr>`;
    }
    html += `</tbody></table>`;
    return html;
}

function renderIterations(iterations) {
    let html = `<table><thead><tr>
        <th>Iter</th><th>c</th><th>eps1</th><th>I1</th><th>J11</th><th>E</th><th>dE</th>
    </tr></thead><tbody>`;
    for(let it of iterations) {
        let cStr = it.c.map(formatNum).join(", ");
        html += `<tr>
            <td>${it.iter}</td>
            <td>[${cStr}]</td>
            <td>${formatNum(it.eps1)}</td>
            <td>${formatNum(it.I1)}</td>
            <td>${formatNum(it.J11)}</td>
            <td>${formatNum(it.E)}</td>
            <td>${it.dE.toExponential(4)}</td>
        </tr>`;
    }
    html += `</tbody></table>`;
    return html;
}

// --- Math Primitives ---
function zeros(n, m = n) {
    return Array(n).fill(0).map(() => Array(m).fill(0));
}

function matMul(A, B) {
    let n = A.length, m = A[0].length, p = B[0].length;
    let C = zeros(n, p);
    for(let i=0; i<n; i++)
        for(let j=0; j<p; j++)
            for(let k=0; k<m; k++)
                C[i][j] += A[i][k] * B[k][j];
    return C;
}

function transpose(A) {
    let n = A.length, m = A[0].length;
    let B = zeros(m, n);
    for(let i=0; i<n; i++)
        for(let j=0; j<m; j++)
            B[j][i] = A[i][j];
    return B;
}

function matSub(A, B) {
    let n = A.length, m = A[0].length;
    let C = zeros(n, m);
    for(let i=0; i<n; i++)
        for(let j=0; j<m; j++)
            C[i][j] = A[i][j] - B[i][j];
    return C;
}

// Jacobi diagonalization for real symmetric matrix
function jacobi(A_in) {
    let n = A_in.length;
    let A = A_in.map(row => [...row]);
    let V = Array(n).fill(0).map((_, i) => Array(n).fill(0).map((_, j) => (i === j ? 1 : 0)));
    let tol = 1e-12;
    let max_iter = 1000;

    for (let iter = 0; iter < max_iter; iter++) {
        let p = 0;
        let q = 1;
        let max_val = -1;
        for (let i = 0; i < n; i++) {
            for (let j = i + 1; j < n; j++) {
                if (Math.abs(A[i][j]) > max_val) {
                    max_val = Math.abs(A[i][j]);
                    p = i;
                    q = j;
                }
            }
        }

        if (max_val < tol) {
            break;
        }

        let diff = A[q][q] - A[p][p];
        let t;
        if (Math.abs(A[p][q]) < Math.abs(diff) * 1e-15) {
            t = A[p][q] / diff;
        } else {
            let theta = diff / (2.0 * A[p][q]);
            t = 1.0 / (Math.abs(theta) + Math.sqrt(theta * theta + 1.0));
            if (theta < 0) t = -t;
        }

        let c = 1.0 / Math.sqrt(1 + t * t);
        let s = t * c;
        let tau = s / (1.0 + c);
        let h_val = t * A[p][q];

        A[p][p] -= h_val;
        A[q][q] += h_val;
        A[p][q] = 0;
        A[q][p] = 0;

        for (let i = 0; i < n; i++) {
            if (i !== p && i !== q) {
                let temp_p = A[i][p];
                let temp_q = A[i][q];
                A[i][p] = temp_p - s * (temp_q + tau * temp_p);
                A[p][i] = A[i][p];
                A[i][q] = temp_q + s * (temp_p - tau * temp_q);
                A[q][i] = A[i][q];
            }
        }

        for (let i = 0; i < n; i++) {
            let temp_p = V[i][p];
            let temp_q = V[i][q];
            V[i][p] = temp_p - s * (temp_q + tau * temp_p);
            V[i][q] = temp_q + s * (temp_p - tau * temp_q);
        }
    }

    let eigenVals = [];
    for (let i = 0; i < n; i++) eigenVals.push(A[i][i]);

    let pairs = [];
    for (let i = 0; i < n; i++) {
        pairs.push({ val: eigenVals[i], col: i });
    }
    pairs.sort((a, b) => a.val - b.val);

    let sortedEigenVals = pairs.map(p => p.val);
    let sortedEigenVecs = Array(n).fill(0).map(() => Array(n).fill(0));
    for (let i = 0; i < n; i++) {
        for (let j = 0; j < n; j++) {
            sortedEigenVecs[i][j] = V[i][pairs[j].col];
        }
    }
    return { eigenvalues: sortedEigenVals, eigenvectors: sortedEigenVecs };
}

// X = S^(-1/2)
function buildXMatrix(S) {
    let { eigenvalues, eigenvectors: V } = jacobi(S);
    let n = S.length;
    let D_inv_sqrt = zeros(n);
    for (let i = 0; i < n; i++) {
        D_inv_sqrt[i][i] = 1.0 / Math.sqrt(eigenvalues[i]);
    }
    let VT = transpose(V);
    let temp = matMul(V, D_inv_sqrt);
    return matMul(temp, VT);
}

// --- System Integrals ---
function buildOverlap(alphas) {
    let n = alphas.length;
    let S = zeros(n);
    for (let p = 0; p < n; p++) {
        for (let q = 0; q < n; q++) {
            if (p === q) {
                S[p][q] = 1.0;
            } else {
                let ap = alphas[p];
                let aq = alphas[q];
                S[p][q] = Math.pow(2.0 * Math.sqrt(ap * aq) / (ap + aq), 3);
            }
        }
    }
    return S;
}

function buildHcore(alphas, Z=2) {
    let n = alphas.length;
    let h = zeros(n);
    for (let p = 0; p < n; p++) {
        for (let q = 0; q < n; q++) {
            let ap = alphas[p];
            let aq = alphas[q];
            let coef = Math.pow(Math.sqrt(ap * aq) / (ap + aq), 3);
            h[p][q] = 4.0 * coef * (ap * aq - Z * (ap + aq));
        }
    }
    return h;
}

function buildERI(alphas) {
    let n = alphas.length;
    let eri = Array(n).fill(0).map(() => 
        Array(n).fill(0).map(() => 
            Array(n).fill(0).map(() => 
                Array(n).fill(0)
            )
        )
    );
    for(let p=0; p<n; p++) {
        for(let q=0; q<n; q++) {
            for(let r=0; r<n; r++) {
                for(let t=0; t<n; t++) {
                    let ap = alphas[p], aq = alphas[q], ar = alphas[r], at = alphas[t];
                    let sigma = ap + aq + ar + at;
                    let apq = ap + aq;
                    let art = ar + at;
                    let pi_a = ap * aq * ar * at; // product of alphas
                    
                    let term1 = 1.0 / (Math.pow(apq, 3) * Math.pow(art, 2));
                    let term2 = 1.0 / (Math.pow(apq, 3) * Math.pow(sigma, 2));
                    let term3 = 1.0 / (Math.pow(apq, 2) * Math.pow(sigma, 3));
                    
                    eri[p][q][r][t] = 32.0 * Math.pow(pi_a, 1.5) * (term1 - term2 - term3);
                }
            }
        }
    }
    return eri;
}

// --- SCF Loop ---
function runSCF(alphas, M) {
    let Z = 2.0;
    let threshold = 1e-8;
    let max_iter = 100;
    
    let S = buildOverlap(alphas);
    let X = buildXMatrix(S);
    let h = buildHcore(alphas, Z);
    let eri = buildERI(alphas);

    let c = Array(M).fill(0);
    c[0] = 1.0;
    
    let iterations = [];
    let E_old = 0.0;
    let converged = false;

    for (let iter = 1; iter <= max_iter; iter++) {
        // Build Fock matrix F(p,q) = h(p,q) + sum_r sum_t c(r)c(t) eri(p,q,r,t)
        let F = zeros(M);
        for(let p=0; p<M; p++) {
            for(let q=0; q<M; q++) {
                F[p][q] = h[p][q];
                for(let r=0; r<M; r++) {
                    for(let t=0; t<M; t++) {
                        F[p][q] += c[r] * c[t] * eri[p][q][r][t];
                    }
                }
            }
        }

        // F' = X F X
        let F_prime = matMul(X, matMul(F, X));

        // Diagonalize
        let { eigenvalues, eigenvectors } = jacobi(F_prime);
        let eps1 = eigenvalues[0];
        
        // Take corresponding eigenvector c'
        let c_prime = Array(M).fill(0);
        for(let i=0; i<M; i++) c_prime[i] = eigenvectors[i][0];

        // c = X c'
        let c_new = Array(M).fill(0);
        for(let i=0; i<M; i++) {
            for(let j=0; j<M; j++) {
                c_new[i] += X[i][j] * c_prime[j];
            }
        }

        // Normalize using c^T S c = 1
        let normSq = 0;
        for(let p=0; p<M; p++) {
            for(let q=0; q<M; q++) {
                normSq += c_new[p] * c_new[q] * S[p][q];
            }
        }
        let norm = Math.sqrt(normSq);
        for(let i=0; i<M; i++) c_new[i] /= norm;

        // Enforce sign convention
        if (c_new[0] < 0) {
            for(let i=0; i<M; i++) c_new[i] *= -1.0;
        }

        c = c_new;

        // Density R
        let R = zeros(M);
        for(let p=0; p<M; p++) {
            for(let q=0; q<M; q++) {
                R[p][q] = c[p] * c[q];
            }
        }

        // Energies
        let I1 = 0;
        for(let p=0; p<M; p++) {
            for(let q=0; q<M; q++) {
                I1 += R[p][q] * h[p][q];
            }
        }

        let J11 = 0;
        for(let p=0; p<M; p++) {
            for(let q=0; q<M; q++) {
                for(let r=0; r<M; r++) {
                    for(let t=0; t<M; t++) {
                        J11 += c[p]*c[q]*c[r]*c[t] * eri[p][q][r][t];
                    }
                }
            }
        }

        let E = 2.0 * I1 + J11;
        let dE = Math.abs(E - E_old);

        iterations.push({
            iter,
            c: [...c],
            eps1,
            I1,
            J11,
            E,
            dE
        });

        if (iter > 1 && dE < threshold) {
            converged = true;
            break;
        }
        E_old = E;
    }

    return {
        S, X, h, eri,
        c,
        iterations,
        converged
    };
}

function computeChecks(S, F, c, eps1, J11) {
    let M = S.length;
    let R = zeros(M);
    for(let p=0; p<M; p++) {
        for(let q=0; q<M; q++) {
            R[p][q] = c[p] * c[q];
        }
    }

    let E_check = 2.0 * eps1 - J11;

    let RSR = matMul(R, matMul(S, R));
    let diff_RSR_R = matSub(RSR, R);
    let max_RSR_R = 0;
    for(let p=0; p<M; p++) {
        for(let q=0; q<M; q++) {
            max_RSR_R = Math.max(max_RSR_R, Math.abs(diff_RSR_R[p][q]));
        }
    }

    let FRS = matMul(F, matMul(R, S));
    let SRF = matMul(S, matMul(R, F));
    let diff_FRS_SRF = matSub(FRS, SRF);
    let max_FRS_SRF = 0;
    for(let p=0; p<M; p++) {
        for(let q=0; q<M; q++) {
            max_FRS_SRF = Math.max(max_FRS_SRF, Math.abs(diff_FRS_SRF[p][q]));
        }
    }

    return { E_check, R, RSR, max_RSR_R, FRS, SRF, max_FRS_SRF };
}

function parseInput() {
    let M_str = document.getElementById("M").value;
    let alphas_str = document.getElementById("alphas").value;
    
    let M = parseInt(M_str);
    if (isNaN(M) || M <= 0) {
        throw new Error("M must be a positive integer.");
    }

    let alphas = alphas_str.split(",").map(s => parseFloat(s.trim())).filter(n => !isNaN(n));
    if (alphas.length !== M) {
        throw new Error(`Expected ${M} alpha values, but found ${alphas.length}. Please check your input.`);
    }

    if (alphas.some(a => a <= 0)) {
        throw new Error("All alpha values must be positive.");
    }

    return { M, alphas };
}

function main() {
    let status = document.getElementById("status");
    try {
        status.style.display = "none";
        
        let { M, alphas } = parseInput();
        alphas.sort((a, b) => a - b);
        
        // --- Core Algorithm ---
        let res = runSCF(alphas, M);
        
        // Compute final F matrix to pass into part 3 checks
        let F_final = zeros(M);
        for(let p=0; p<M; p++) {
            for(let q=0; q<M; q++) {
                F_final[p][q] = res.h[p][q];
                for(let r=0; r<M; r++) {
                    for(let t=0; t<M; t++) {
                        F_final[p][q] += res.c[r] * res.c[t] * res.eri[p][q][r][t];
                    }
                }
            }
        }

        let last_it = res.iterations[res.iterations.length - 1];
        let checks = computeChecks(res.S, F_final, res.c, last_it.eps1, last_it.J11);

        // --- Render UI ---
        let p1 = document.getElementById("part1-panel");
        let p2 = document.getElementById("part2-panel");
        let p3 = document.getElementById("part3-panel");

        // Force reflow to re-trigger animations
        p1.classList.remove("animate-in");
        p2.classList.remove("animate-in");
        p3.classList.remove("animate-in");
        void p1.offsetWidth; 

        p1.style.display = "block";
        p2.style.display = "block";
        p3.style.display = "block";
        
        p1.classList.add("animate-in");
        p1.style.animationDelay = "0.1s";
        p2.classList.add("animate-in");
        p2.style.animationDelay = "0.2s";
        p3.classList.add("animate-in");
        p3.style.animationDelay = "0.3s";

        // Part 1
        let matHtml = `
            <div class="stat-box" style="margin-bottom: 2rem;">
                <div class="stat-label">Sorted Alphas</div>
                <div class="stat-val" style="color: #a855f7;">${alphas.join(", ")}</div>
            </div>
            <div class="matrices-grid">
                <div>${renderMatrix("Overlap Matrix S", res.S)}</div>
                <div>${renderMatrix("S^(-1/2) Matrix X", res.X)}</div>
                <div>${renderMatrix("Core Hamiltonian h", res.h)}</div>
            </div>
        `;
        document.getElementById("part1-content").innerHTML = matHtml;

        // Part 2
        document.getElementById("part2-content").innerHTML = renderIterations(res.iterations);

        // Part 3
        let checksHtml = `
            <div class="stat-grid">
                <div class="stat-box">
                    <div class="stat-label">Final Energy (E)</div>
                    <div class="stat-val">${formatNum(last_it.E)}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Convergence</div>
                    <div class="stat-val ${res.converged ? 'success' : 'fail'}">${res.converged ? "ACHIEVED" : "FAILED"}</div>
                </div>
            </div>
            <hr>
            <h4>Verification Checks</h4>
            
            <div class="stat-grid">
                <div class="stat-box">
                    <div class="stat-label">E_check (2*eps1 - J11)</div>
                    <div class="stat-val" style="font-size: 1rem;">${formatNum(checks.E_check)}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Max |RSR - R|</div>
                    <div class="stat-val" style="font-size: 1rem;">${checks.max_RSR_R.toExponential(4)}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Max |FRS - SRF|</div>
                    <div class="stat-val" style="font-size: 1rem;">${checks.max_FRS_SRF.toExponential(4)}</div>
                </div>
            </div>

            <div class="matrices-grid" style="margin-top: 2rem;">
                <div>${renderMatrix("Density Matrix R", checks.R)}</div>
                <div>${renderMatrix("RSR Matrix", checks.RSR)}</div>
                <div>${renderMatrix("FRS Matrix", checks.FRS)}</div>
                <div>${renderMatrix("SRF Matrix", checks.SRF)}</div>
            </div>
        `;
        document.getElementById("part3-content").innerHTML = checksHtml;

    } catch (e) {
        showError(e.message);
    }
}
</script>
</body>
</html>
